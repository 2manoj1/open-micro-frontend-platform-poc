name: micro-frontend-platform

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile

x-shell-public-env: &shell-public-env
  NEXT_PUBLIC_PLATFORM_SHELL_NAME: Open Micro Platform
  NEXT_PUBLIC_MICRO_APP_VITE_REFRESH: 'false'
  NEXT_PUBLIC_CUSTOMER_APP_ORIGIN: https://customer.manojmukherjee.co.in
  NEXT_PUBLIC_BILLING_APP_ORIGIN: https://billing.manojmukherjee.co.in
  NEXT_PUBLIC_ANALYTICS_APP_ORIGIN: https://analytics.manojmukherjee.co.in
  NEXT_PUBLIC_ADMIN_APP_ORIGIN: https://admin.manojmukherjee.co.in
  NEXT_PUBLIC_AI_ASSISTANT_APP_ORIGIN: https://ai-assistant.manojmukherjee.co.in
  NEXT_PUBLIC_VUE_COMMERCE_APP_ORIGIN: https://vue-commerce.manojmukherjee.co.in
  NEXT_PUBLIC_ANGULAR_OPS_APP_ORIGIN: https://angular-ops.manojmukherjee.co.in
  NEXT_PUBLIC_DESIGN_SYSTEM_APP_ORIGIN: https://design-system.manojmukherjee.co.in
  NEXT_PUBLIC_MCP_DEMO_APP_ORIGIN: https://mcp-demo.manojmukherjee.co.in
  NEXT_PUBLIC_CUSTOMER_APP_ENTRY_PATH: /customer-app.js
  NEXT_PUBLIC_BILLING_APP_ENTRY_PATH: /billing-app.js
  NEXT_PUBLIC_ANALYTICS_APP_ENTRY_PATH: /analytics-app.js
  NEXT_PUBLIC_ADMIN_APP_ENTRY_PATH: /admin-app.js
  NEXT_PUBLIC_AI_ASSISTANT_APP_ENTRY_PATH: /ai-assistant-app.js
  NEXT_PUBLIC_VUE_COMMERCE_APP_ENTRY_PATH: /vue-commerce-app.js
  NEXT_PUBLIC_ANGULAR_OPS_APP_ENTRY_PATH: /angular-ops-app.js
  NEXT_PUBLIC_DESIGN_SYSTEM_APP_ENTRY_PATH: /design-system-app.js
  NEXT_PUBLIC_MCP_DEMO_APP_ENTRY_PATH: /mcp-demo-app.js
  NEXT_PUBLIC_CUSTOMER_APP_STYLE_PATH: /customer-app.css
  NEXT_PUBLIC_BILLING_APP_STYLE_PATH: /billing-app.css
  NEXT_PUBLIC_ANALYTICS_APP_STYLE_PATH: /analytics-app.css
  NEXT_PUBLIC_ADMIN_APP_STYLE_PATH: /admin-app.css
  NEXT_PUBLIC_AI_ASSISTANT_APP_STYLE_PATH: /ai-assistant-app.css
  NEXT_PUBLIC_VUE_COMMERCE_APP_STYLE_PATH: /vue-commerce-app.css
  NEXT_PUBLIC_ANGULAR_OPS_APP_STYLE_PATH: /angular-ops-app.css
  NEXT_PUBLIC_DESIGN_SYSTEM_APP_STYLE_PATH: /design-system-app.css
  NEXT_PUBLIC_MCP_DEMO_APP_STYLE_PATH: /mcp-demo-app.css

services:
  customer:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/customer-app'
    environment:
      APP_FILTER: '@micro-frontend/customer-app'
      APP_KIND: remote
      PORT: 5173
    ports:
      - '5173:5173'

  billing:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/billing-app'
    environment:
      APP_FILTER: '@micro-frontend/billing-app'
      APP_KIND: remote
      PORT: 5174
    ports:
      - '5174:5174'

  analytics:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/analytics-app'
    environment:
      APP_FILTER: '@micro-frontend/analytics-app'
      APP_KIND: remote
      PORT: 5175
    ports:
      - '5175:5175'

  admin:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/admin-app'
    environment:
      APP_FILTER: '@micro-frontend/admin-app'
      APP_KIND: remote
      PORT: 5176
    ports:
      - '5176:5176'

  ai-assistant:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/ai-assistant-app'
    environment:
      APP_FILTER: '@micro-frontend/ai-assistant-app'
      APP_KIND: remote
      PORT: 5177
    ports:
      - '5177:5177'

  vue-commerce:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/vue-commerce-app'
    environment:
      APP_FILTER: '@micro-frontend/vue-commerce-app'
      APP_KIND: remote
      PORT: 5178
    ports:
      - '5178:5178'

  angular-ops:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/angular-ops-app'
    environment:
      APP_FILTER: '@micro-frontend/angular-ops-app'
      APP_KIND: remote
      PORT: 5179
    ports:
      - '5179:5179'

  design-system:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/design-system-app'
    environment:
      APP_FILTER: '@micro-frontend/design-system-app'
      APP_KIND: remote
      PORT: 5180
    ports:
      - '5180:5180'

  mcp-demo:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/mcp-demo-app'
    environment:
      APP_FILTER: '@micro-frontend/mcp-demo-app'
      APP_KIND: remote
      PORT: 5181
    ports:
      - '5181:5181'

  shell:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/shell'
        <<: *shell-public-env
    depends_on:
      - customer
      - billing
      - analytics
      - admin
      - ai-assistant
      - vue-commerce
      - angular-ops
      - design-system
      - mcp-demo
    environment:
      APP_FILTER: '@micro-frontend/shell'
      APP_KIND: shell
      PORT: 3001
      <<: *shell-public-env
    ports:
      - '3001:3001'

  mcp-apps-server:
    build:
      <<: *app-build
      args:
        APP_FILTER: '@micro-frontend/mcp-apps-server'
    depends_on:
      - shell
      - customer
      - billing
      - analytics
      - admin
      - ai-assistant
      - vue-commerce
      - angular-ops
      - design-system
      - mcp-demo
    environment:
      APP_FILTER: '@micro-frontend/mcp-apps-server'
      APP_KIND: mcp
      PORT: 8787
      SHELL_ORIGIN: http://shell:3001
      PUBLIC_SHELL_ORIGIN: https://shell.manojmukherjee.co.in
      PUBLIC_MCP_ORIGIN: https://ai-assistant.manojmukherjee.co.in
      MCP_APPS_HOST_PROFILE: portable
      MCP_APPS_ASSET_VERSION: 0.8.0-podman
      MCP_APP_CUSTOMER_PUBLIC_ORIGIN: https://customer.manojmukherjee.co.in
      MCP_APP_BILLING_PUBLIC_ORIGIN: https://billing.manojmukherjee.co.in
      MCP_APP_ANALYTICS_PUBLIC_ORIGIN: https://analytics.manojmukherjee.co.in
      MCP_APP_ADMIN_PUBLIC_ORIGIN: https://admin.manojmukherjee.co.in
      MCP_APP_AI_ASSISTANT_PUBLIC_ORIGIN: https://ai-assistant.manojmukherjee.co.in
      MCP_APP_VUE_COMMERCE_PUBLIC_ORIGIN: https://vue-commerce.manojmukherjee.co.in
      MCP_APP_ANGULAR_OPS_PUBLIC_ORIGIN: https://angular-ops.manojmukherjee.co.in
      MCP_APP_DESIGN_SYSTEM_PUBLIC_ORIGIN: https://design-system.manojmukherjee.co.in
      MCP_APP_MCP_DEMO_PUBLIC_ORIGIN: https://mcp-demo.manojmukherjee.co.in
    ports:
      - '8787:8787'
